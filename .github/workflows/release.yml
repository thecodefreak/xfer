name: Release

on:
  push:
    tags:
      - "release-v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Derive version from tag
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#release-v}"
          version_tag="v${version}"
          is_prerelease="false"
          if [[ "${version}" == *-* ]]; then
            is_prerelease="true"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "version_tag=${version_tag}" >> "${GITHUB_OUTPUT}"
          echo "is_prerelease=${is_prerelease}" >> "${GITHUB_OUTPUT}"

  build-artifacts:
    name: Build binaries (${{ matrix.platform_id }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ""
            ext: ""
            archive: tar.gz
            platform_id: linux_amd64
          - goos: linux
            goarch: arm64
            goarm: ""
            ext: ""
            archive: tar.gz
            platform_id: linux_arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            ext: ""
            archive: tar.gz
            platform_id: linux_armv7
          - goos: linux
            goarch: "386"
            goarm: ""
            ext: ""
            archive: tar.gz
            platform_id: linux_386
          - goos: windows
            goarch: amd64
            goarm: ""
            ext: .exe
            archive: zip
            platform_id: windows_amd64
          - goos: windows
            goarch: arm64
            goarm: ""
            ext: .exe
            archive: zip
            platform_id: windows_arm64
          - goos: windows
            goarch: "386"
            goarm: ""
            ext: .exe
            archive: zip
            platform_id: windows_386
          - goos: darwin
            goarch: amd64
            goarm: ""
            ext: ""
            archive: tar.gz
            platform_id: darwin_amd64
          - goos: darwin
            goarch: arm64
            goarm: ""
            ext: ""
            archive: tar.gz
            platform_id: darwin_arm64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package binaries
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          EXT: ${{ matrix.ext }}
          ARCHIVE: ${{ matrix.archive }}
          PLATFORM_ID: ${{ matrix.platform_id }}
        shell: bash
        run: |
          mkdir -p dist
          mkdir -p build

          export CGO_ENABLED=0
          if [[ -n "${GOARM}" ]]; then
            export GOARM
          fi

          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_SHORT="${GITHUB_SHA::7}"
          LDFLAGS="-s -w"
          LDFLAGS="${LDFLAGS} -X 'github.com/thecodefreak/xfer/cmd/xfer/commands.Version=${VERSION_TAG}'"
          LDFLAGS="${LDFLAGS} -X 'github.com/thecodefreak/xfer/cmd/xfer/commands.Commit=${COMMIT_SHORT}'"
          LDFLAGS="${LDFLAGS} -X 'github.com/thecodefreak/xfer/cmd/xfer/commands.BuildDate=${BUILD_DATE}'"

          go build -trimpath -ldflags "${LDFLAGS}" -o "build/xfer${EXT}" ./cmd/xfer
          go build -trimpath -ldflags "${LDFLAGS}" -o "build/xfer-server${EXT}" ./cmd/xfer-server

          if [[ "${ARCHIVE}" == "tar.gz" ]]; then
            tar -C build -czf "dist/xfer_${VERSION_TAG}_${PLATFORM_ID}.tar.gz" "xfer${EXT}"
            tar -C build -czf "dist/xfer-server_${VERSION_TAG}_${PLATFORM_ID}.tar.gz" "xfer-server${EXT}"
          else
            (
              cd build
              zip -q "../dist/xfer_${VERSION_TAG}_${PLATFORM_ID}.zip" "xfer${EXT}"
              zip -q "../dist/xfer-server_${VERSION_TAG}_${PLATFORM_ID}.zip" "xfer-server${EXT}"
            )
          fi

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform_id }}
          path: dist/*
          if-no-files-found: error
          compression-level: 0

  scan-final-image:
    name: Scan final Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for security scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: xfer-release-scan:${{ github.sha }}

      - name: Scan final image for HIGH/CRITICAL CVEs
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: xfer-release-scan:${{ github.sha }}
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: false
          format: table
          exit-code: 1

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [prepare, build-artifacts, scan-final-image]
    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: downloaded-artifacts
          merge-multiple: false

      - name: Consolidate artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          shopt -s nullglob

          found=0
          for artifact_dir in downloaded-artifacts/artifacts-*; do
            for file in "$artifact_dir"/*; do
              cp "$file" dist/
              found=1
            done
          done

          if [[ "$found" -ne 1 ]]; then
            echo "No release artifacts were downloaded"
            exit 1
          fi

      - name: Generate checksums
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
        shell: bash
        run: |
          (
            cd dist
            sha256sum * > "sha256sums_${VERSION_TAG}.txt"
          )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.version_tag }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/*

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: [prepare, scan-final-image]
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: docker_tags
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        shell: bash
        run: |
          echo "tags<<EOF" >> "${GITHUB_OUTPUT}"
          echo "ghcr.io/thecodefreak/xfer:${VERSION_TAG}" >> "${GITHUB_OUTPUT}"
          if [[ "${IS_PRERELEASE}" != "true" ]]; then
            echo "ghcr.io/thecodefreak/xfer:latest" >> "${GITHUB_OUTPUT}"
          fi
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
